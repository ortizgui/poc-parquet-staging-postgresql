services:
  postgres:
    image: postgres:16
    container_name: poc-postgres
    environment:
      POSTGRES_DB: pocdb
      POSTGRES_USER: pocuser
      POSTGRES_PASSWORD: pocpass
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pocuser -d pocdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  ministack:
    image: localstack/localstack:latest
    container_name: poc-ministack
    environment:
      SERVICES: s3,sqs,sns
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  consumer1:
    build:
      context: .
      dockerfile: Dockerfile.consumer1
    container_name: poc-consumer1
    environment:
      POSTGRES_HOST: postgres
      AWS_ENDPOINT_URL: http://ministack:4566
    depends_on:
      postgres:
        condition: service_healthy
      ministack:
        condition: service_healthy

  consumer2:
    build:
      context: .
      dockerfile: Dockerfile.consumer2
    container_name: poc-consumer2
    environment:
      POSTGRES_HOST: postgres
      AWS_ENDPOINT_URL: http://ministack:4566
    depends_on:
      postgres:
        condition: service_healthy
      ministack:
        condition: service_healthy

  merge:
    build:
      context: .
      dockerfile: Dockerfile.merge
    container_name: poc-merge
    environment:
      POSTGRES_HOST: postgres
      AWS_ENDPOINT_URL: http://ministack:4566
    depends_on:
      postgres:
        condition: service_healthy
      ministack:
        condition: service_healthy

volumes:
  pgdata:
